{% extends 'base.html' %}
{% block content %}
  <h2>Add Crop Data to Report #{{ report_id }}</h2>
  <form method="post">
    <label for="tract">Tract Number</label>
    <input name="tract" id="tract" required>
    
    <label for="crop">Crop Type</label>
    <select name="crop" id="crop">
        <option value="Corn">Corn</option>
        <option value="Soybeans">Soybeans</option>
        <option value="Wheat">Wheat</option>
    </select>
    
    <label for="acres">Acreage</label>
    <input name="acres" id="acres" type="number" step="0.1" required>
    
    <input type="submit" value="Add Line Item">
  </form>
{% endblock %}
